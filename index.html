<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Current Time</title>
  <style>
    :root {
      --bg:#f0f0f0; --fg:#333; --muted:#666; --card:#fff;
      --accent:#007bff; --accent-hover:#0056b3;
      --border:#ccc; --shadow:0 4px 8px rgba(0,0,0,.1);
    }
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:var(--bg);
      color:var(--fg);
      transition: background-color .5s, color .5s;
      padding:24px;
    }
    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(280px,1fr));
      gap:20px;
      align-items:stretch;
    }
    .display-container{
      display:flex;
      flex-direction:column;
      align-items:center;
      border:2px solid var(--border);
      border-radius:10px;
      padding:20px;
      background:var(--card);
      box-shadow:var(--shadow);
      min-height:180px;
    }
    .group-title{
      font-size:1.2rem;
      margin-bottom:6px;
      color:var(--fg);
      font-weight:600;
      text-align:center;
    }
    #time,#stopwatch,#countdown{
      font-size:3.2rem;
      color:var(--fg);
      transition: transform .5s, text-shadow .5s, color .5s;
    }
    #date{
      font-size:1.1rem;
      color:var(--muted);
      margin-top:4px;
    }
    select,input,button{
      margin:8px;
      font-size:1rem;
      padding:10px 16px;
      border:1px solid var(--border);
      border-radius:6px;
      background:var(--bg);
      color:var(--fg);
      cursor:pointer;
      transition: background-color .3s, border-color .3s;
    }
    button{
      background:var(--accent);
      color:#fff;
      border:none;
    }
    button:hover{
      background:var(--accent-hover);
    }
  </style>
</head>
<body>
  <div class="grid">
    <div class="display-container time-card">
      <div class="group-title" id="titleTime">Current Time</div>
      <div id="time" class="time-plain" aria-live="polite">00:00:00</div>
      <div id="date">January 1, 1970</div>
      <button id="announceBtn" style="margin-top:14px" onclick="announceTime()">Announce Time</button>
    </div>

    <div class="display-container">
      <div class="group-title" id="titleSettings">Settings</div>
      <label for="timezone" id="labelTimezone">Time zone</label>
      <select id="timezone">
        <option value="local">Local Time</option>
        <option value="UTC">UTC</option>
        <option value="Europe/Berlin">Berlin</option>
        <option value="America/New_York">New York</option>
        <option value="Europe/London">London</option>
        <option value="Asia/Tokyo">Tokyo</option>
      </select>

      <label for="fontSelector" id="labelFont">Font</label>
      <select id="fontSelector">
        <option value="Arial">Arial</option>
        <option value="Courier New">Courier New</option>
        <option value="Georgia">Georgia</option>
        <option value="Times New Roman">Times New Roman</option>
        <option value="Verdana">Verdana</option>
      </select>

      <label for="displayMode" id="labelDisplay">Display</label>
      <select id="displayMode">
        <option value="plain">Plain</option>
        <option value="wobble">Wobble</option>
        <option value="pulse">Pulse</option>
        <option value="spin">Spin</option>
        <option value="matrix">Matrix</option>
        <option value="neon">Neon</option>
        <option value="segment">Segment</option>
      </select>
    </div>

    <div class="display-container">
      <div class="group-title" id="titleCountdown">Countdown</div>
      <div id="countdown" aria-live="polite">00:00</div>
      <div>
        <input type="number" id="countdownMinutes" placeholder="Minutes" min="0" />
        <button id="btnStartCD" onclick="startCountdown()">Start Countdown</button>
        <button id="btnStopCD" onclick="stopCountdown()">Stop Countdown</button>
      </div>
    </div>
  </div>

  <script>
    let countdownInterval;
    function startCountdown() {
      const input = document.getElementById("countdownMinutes");
      const minutes = parseInt(input.value, 10);
      if (isNaN(minutes) || minutes <= 0) {
        alert("Please enter a valid number of minutes.");
        return;
      }

      const countdownElement = document.getElementById("countdown");
      let totalTimeInSeconds = minutes * 60;

      clearInterval(countdownInterval);
      countdownInterval = setInterval(() => {
        const minutesRemaining = Math.floor(totalTimeInSeconds / 60);
        const secondsRemaining = totalTimeInSeconds % 60;
        countdownElement.textContent = `${minutesRemaining}:${secondsRemaining.toString().padStart(2, "0")}`;

        if (totalTimeInSeconds === 0) {
          clearInterval(countdownInterval);
          alert("Countdown complete!");
        }

        totalTimeInSeconds -= 1;
      }, 1000);
    }

    function stopCountdown() {
      clearInterval(countdownInterval);
    }
  </script>
</body>
</html>
